services:
  - type: web
    name: futurelink-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: MONGODB_URI
        sync: false
      - key: CLIENT_ORIGIN
        value: "https://future-linkservices.com,https://www.future-linkservices.com,http://localhost:5173"
